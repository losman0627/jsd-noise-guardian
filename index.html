<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#f5f7fb"><title>JSD · 도시 소음 지킴이</title><style>html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Segoe UI",sans-serif;background:#f5f7fb;color:#172033}#boot{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}#boot b{display:block;color:#153b73;font-size:20px}#boot span{display:block;margin-top:8px;color:#68758b;font-size:12px;line-height:1.6;word-break:break-word;max-width:560px}</style></head><body><div id="boot"><div><b>JSD 도시 소음 지킴이</b><span>사이트를 불러오는 중입니다.</span></div></div><script>
(async()=>{
  const DEFAULT_GAS_URL='https://script.google.com/macros/s/AKfycbwHY7B15trgsBZZcug2snywAO2AVg8LfmpshAdxlGa0Afe9d_yW-tyaewmSOix5IrEl/exec';
  // 이 사이트는 하나의 공용 백엔드만 사용합니다. 과거에 저장된 다른 /exec 주소가
  // 남아 있어 연결 오류가 발생하지 않도록 시작 시 현재 주소로 항상 동기화합니다.
  try{localStorage.setItem('jsd_gas_url',DEFAULT_GAS_URL);}catch(_){/* private mode */}

  const gunzipBytes=async(bytes,label)=>{
    if(!('DecompressionStream' in window)) throw new Error('이 브라우저는 gzip 압축 해제를 지원하지 않습니다. 최신 Chrome 또는 Edge를 사용해 주세요.');
    try{
      const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      return await new Response(stream).text();
    }catch(error){throw new Error(`${label} 압축 해제 실패: ${error.message||error}`);}
  };

  const decodeAsset=async url=>{
    let r;
    try{r=await fetch(url+'?v=20260714-8',{cache:'no-store'});}catch(error){throw new Error(`${url} 네트워크 요청 실패: ${error.message||error}`);}
    if(!r.ok) throw new Error(`${url} 로드 실패 (${r.status})`);
    let bytes;
    try{bytes=new Uint8Array(await r.arrayBuffer());}catch(error){throw new Error(`${url} 읽기 실패: ${error.message||error}`);}
    const isGzip=bytes.length>2&&bytes[0]===0x1f&&bytes[1]===0x8b;
    return isGzip?gunzipBytes(bytes,url):new TextDecoder('utf-8').decode(bytes);
  };

  const decodeBase64Gzip=async url=>{
    let r;
    try{r=await fetch(url+'?v=20260714-8',{cache:'no-store'});}catch(error){throw new Error(`${url} 네트워크 요청 실패: ${error.message||error}`);}
    if(!r.ok) throw new Error(`${url} 로드 실패 (${r.status})`);
    const encoded=(await r.text()).replace(/\s+/g,'');
    let binary;
    try{binary=atob(encoded);}catch(error){throw new Error(`${url} Base64 복원 실패: ${error.message||error}`);}
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    return gunzipBytes(bytes,url);
  };

  try{
    const [html,css,js1,js2]=await Promise.all([
      decodeAsset('/assets/index.html.gz'),
      decodeAsset('/assets/styles.css.gz'),
      decodeAsset('/assets/app-1.js.gz'),
      decodeBase64Gzip('/assets/app-2.js.gz.b64')
    ]);
    const parsed=new DOMParser().parseFromString(html,'text/html');
    parsed.querySelectorAll('script').forEach(el=>el.remove());
    parsed.querySelectorAll('link[href="styles.css"]').forEach(el=>el.remove());
    document.documentElement.lang=parsed.documentElement.lang||'ko';
    document.head.innerHTML=parsed.head.innerHTML;
    const style=document.createElement('style');style.textContent=css;document.head.appendChild(style);
    document.body.replaceWith(parsed.body);
    const loadScript=src=>new Promise(resolve=>{const p=document.createElement('script');p.src=src;p.async=false;p.onload=resolve;p.onerror=resolve;document.body.appendChild(p);});
    const loadBackendBridge=async()=>{
      await loadScript('/backend-bridge.js?v=20260714-5');
      try{await window.JSDBackendBridge?.ready;}catch(_){/* direct Apps Script fallback */}
    };
    const loadLanguageTools=async()=>{
      const RealMutationObserver=window.MutationObserver;
      try{
        // 기존 번역기의 지속 감시는 누락 문구를 다시 한글로 되돌릴 수 있어
        // 최초 번역과 설정 UI만 실행하고 지속 번역은 보완 스크립트가 담당합니다.
        window.MutationObserver=class StaticTranslationObserver{
          observe(){}
          disconnect(){}
          takeRecords(){return []}
        };
        await loadScript('/i18n-layout.js?v=20260714-8');
      }finally{
        window.MutationObserver=RealMutationObserver;
      }
      await loadScript('/i18n-complete.js?v=20260714-8');
    };
    const loadEnhancements=async()=>{
      await loadScript('/llm-status.js?v=20260714-5');
      await loadScript('/feedback-update.js?v=20260714-3');
      await loadScript('/product-news-update.js?v=20260714-3');
      await loadLanguageTools();
      await loadScript('/mobile-ui-polish.js?v=20260714-9');
    };
    const run=async()=>{await loadBackendBridge();const s=document.createElement('script');s.textContent=js1+js2;document.body.appendChild(s);loadEnhancements();};
    if(window.L)run();else{const s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';s.crossOrigin='';s.onload=run;s.onerror=run;document.body.appendChild(s);}
  }catch(error){
    console.error(error);
    document.body.innerHTML=`<div id="boot"><div><b>사이트를 불러오지 못했습니다.</b><span>${String(error.message||error)}<br>잠시 후 새로고침해 주세요.</span></div></div>`;
  }
})();
</script></body></html>
